name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install Flask pytest PyYAML import-linter openapi-spec-validator \
            flask-sqlalchemy Flask-Migrate Flask-JWT-Extended pypdf jieba

      - name: Alembic upgrade head (AG-020+)
        run: |
          set -euo pipefail
          export FLASK_APP=wsgi:app
          export DATABASE_URL=sqlite:////tmp/ci_migrations.db
          python -m flask db upgrade

      # Source of truth: spec/architecture.spec.md section 4 contracts.
      - name: lint-imports (architecture.spec section 4 contracts)
        run: |
          set -euo pipefail
          if [ -f app/__init__.py ]; then
            lint-imports --config .importlinter
          else
            echo "::notice::Skipping import-linter until app/__init__.py exists"
          fi

      # architecture.spec.md §5: rg-guard-api / rg-guard-api-task / rg-guard-task-adapter
      - name: rg-guard-api + rg-guard-api-task + rg-guard-task-adapter
        run: |
          set -euo pipefail
          if [ -f app/__init__.py ]; then
            python scripts/ci/rg_guard_api.py
            python scripts/ci/rg_guard_api_task.py
            python scripts/ci/rg_guard_task_adapter.py
          else
            echo "::notice::Skipping rg-guard-* until app/__init__.py exists"
          fi

      - name: Queue contract keys (R-QUEUE-ISO)
        run: |
          set -euo pipefail
          python scripts/ci/check_queue_contract_keys.py

      - name: OpenAPI validate contract.yaml
        run: |
          set -euo pipefail
          python scripts/ci/validate_openapi_contract.py

      # Architecture registry + regression tests.
      - name: Architecture rules (check_rules, test_architecture)
        run: |
          set -euo pipefail
          python scripts/check_rules.py
          python -m pytest tests/test_architecture.py -vv --tb=short

      - name: Pytest (full suite; test_architecture 已在上一步执行)
        run: |
          set -euo pipefail
          set +e
          python -m pytest -vv -ra --strict-markers --tb=short --ignore=tests/test_architecture.py 2>&1 | tee pytest-full.log
          pytest_exit=${PIPESTATUS[0]}
          set -e
          if [ "$pytest_exit" -ne 0 ]; then
            {
              echo "### Pytest failed"
              echo ""
              echo "- Exit code: $pytest_exit"
              echo ""
              echo "#### Last 120 lines"
              echo '```text'
              tail -n 120 pytest-full.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            excerpt=$(tail -n 80 pytest-full.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=Pytest failed::$excerpt"
            exit "$pytest_exit"
          fi

      - name: Upload pytest log artifact (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pytest-full-log
          path: pytest-full.log
          if-no-files-found: warn

      - name: Score gate (fail if score < 80)
        run: |
          set -euo pipefail
          python scripts/score.py

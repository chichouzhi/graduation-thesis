                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Conversation" }
    post:
      tags: [chat]
      summary: 新建会话（须带 term_id，与 ChatJobPayload / conversations 真源一致）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateConversationRequest" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }

  /conversations/{conversation_id}:
    parameters:
      - name: conversation_id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [chat]
      summary: 会话元数据
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
    delete:
      tags: [chat]
      summary: 软删除或归档会话（可选实现）
      responses:
        "204":
          description: No Content

  /conversations/{conversation_id}/messages:
    parameters:
      - name: conversation_id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [chat]
      summary: 分页历史消息（轮询 assistant_message_id 对应占位状态）
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20 }
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: after_message_id
          in: query
          required: false
          description: 与 before_message_id 二选一；基于 message_id 的游标（多轮上下文增量拉取）
          schema: { type: string }
        - name: before_message_id
          in: query
          required: false
          description: 与 after_message_id 二选一；不得与 after_message_id 同请求并用（否则 400）
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Message" }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    post:
      tags: [chat]
      summary: 发送用户消息（异步 queue+worker；HTTP 202）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostUserMessageRequest" }
      responses:
        "202":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostUserMessageResponse" }
        "429":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /chat/jobs/{job_id}:

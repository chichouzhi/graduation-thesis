        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, term_id]
              description: |
                未上传 task_type 时服务端默认 summary；未上传 language 时默认 zh。
                与 execution_plan 阶段 3 document 子任务及落库 DocumentTask.task_type/language 一致。
                `term_id` 须写入 `document_tasks` 并在 **202** 响应 `DocumentTask.term_id` 与后续 GET 列表/详情中回显。
              properties:
                file:
                  type: string
                  format: binary
                term_id:
                  type: string
                  description: 写入 PdfJobPayload/DocumentJobPayload，与 LLM 配额 term 命名空间一致
                task_type:
                  type: string
                  enum: [summary, conclusions, compare]
                language:
                  type: string

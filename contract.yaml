      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Term" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /terms/{term_id}/llm-config:
    parameters:
      - name: term_id
        in: path

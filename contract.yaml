        schema: { type: string }
    get:
      tags: [chat]
      summary: 可选 SSE（text/event-stream）；须专用 worker（x-optional-contracts.sse_stream）
      responses:
        "200":
          description: SSE 增量事件流（事件名与载荷由实现定义；禁止挂默认 API worker 长连接）
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: 未启用 SSE 或未部署 stream worker（**ErrorEnvelope**；`error.code` 写死见部署文档，推荐 **NOT_FOUND** 或 **SSE_NOT_ENABLED**）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "501":
          description: 服务端显式关闭 SSE 或未装配 SSE 能力（**ErrorEnvelope**；推荐 **`SSE_NOT_ENABLED`**）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /document-tasks:
    post:

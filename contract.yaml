# 接口与任务契约（修订版，OpenAPI 3.0.3）
# 对齐：execution_plan.md（四域 + chat_jobs / document_jobs / pdf_parse / keyword_jobs / reconcile_jobs）
# 对齐：architecture.spec.md（Chat/Document 受理 202；错误码；异步 queue+worker；无 API 直连 LLM）
#
# --- 命名规范（全文件唯一真名，禁止 msg_id / conv_id 等别名）---
# 资源主键：一律 `*_id` 后缀 — conversation_id, message_id（messages 表行 id）,
#   user_message_id, assistant_message_id, document_task_id, topic_id, term_id,
#   user_id, job_id, application_id, assignment_id。
# HTTP 路径参数名与语义一致：/document-tasks/{task_id} 中的 task_id 值 === DocumentTask.id === document_task_id。

openapi: 3.0.3
info:
  title: Graduation Design Assistant API Contract
  version: "0.2.6"
  description: |
    Identity / Terms / Taskboard + Chat / Document / Topic / Selection REST + 推荐只读 + 队列任务 body 契约（与 execution_plan 阶段 5 对齐）。
    LLM 相关：仅经 queue + worker；HTTP 受理返回 202（Chat 发消息、Document 上传）。
    异步统一状态（AsyncTaskStatus）：pending → running → done | failed；watchdog 超时 **仅 failed**（见 **x-task-contracts.x-watchdog-on-timeout** 与 **state_machines**）。
    志愿填报 ApplicationFlowStatus 为业务枚举，语义独立于 AsyncTaskStatus（勿混读）。

x-optional-contracts:
  sse_stream:
    description: |
      若交付启用 SSE：须使用专用 worker 进程组（execution_plan LLM 异步表）；路径见 paths /conversations/{conversation_id}/stream。
      默认可不部署。**404 / 501** 响应体须为 **application/json** 的 **ErrorEnvelope**（与全局错误形状一致）；**501** 推荐 **`error.code: SSE_NOT_ENABLED`**（显式关闭或未装配 stream worker）；**404** 可用 **`NOT_FOUND`** 或 **`SSE_NOT_ENABLED`**（须与部署文档写死一致）。

servers:
  - url: https://{host}/api/v1
    variables:
      host:
        default: localhost

tags:
  - name: identity
  - name: terms
  - name: taskboard
  - name: chat
  - name: document
  - name: topic
  - name: selection
  - name: recommendations

components:
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - QUEUE_UNAVAILABLE
                - POLICY_QUEUE_DEPTH
                - LLM_RATE_LIMITED
                - TOPIC_NOT_FOUND
                - APPLICATION_NOT_FOUND
                - ROLE_FORBIDDEN
                - VALIDATION_ERROR
                - NOT_FOUND
                - RESOURCE_CONFLICT
                - CAPACITY_EXCEEDED
                - UNAUTHORIZED
                - SSE_NOT_ENABLED
                - DOMAIN_ERROR
            message: { type: string }
            details: { type: object, additionalProperties: true }

    # 仅用于：chat_jobs、document_tasks、assistant 占位、keyword 异步侧载、reconcile_jobs（若建模为异步任务）
    AsyncTaskStatus:
      type: string
      description: LLM/PDF-worker 任务与 assistant 占位统一四态（pending→running→done|failed）
      enum: [pending, running, done, failed]

    AsyncTaskStateMachine:
      type: object
      description: |
        结构定义（用于工具生成）。**状态转移真源** 为根扩展 **`x-task-contracts.state_machines`**（勿与本组件内空 transitions 混淆）。
      properties:
        states:
          type: array
          items: { $ref: "#/components/schemas/AsyncTaskStatus" }
        transitions:
          type: array
          items:
            type: object
            required: [from, to, trigger]
            properties:
              from: { $ref: "#/components/schemas/AsyncTaskStatus" }
              to: { $ref: "#/components/schemas/AsyncTaskStatus" }
              trigger: { type: string }

    # --- Chat ---
    Conversation:
      type: object
      required: [id, term_id, created_at]
      properties:
        id: { type: string, description: conversation_id }
        term_id: { type: string, description: 非空；与 ChatJobPayload.term_id、配额命名空间一致；须落库于 conversations }
        title: { type: string, nullable: true }
        context_type:
          type: string
          enum: [general, topic, document]
        context_ref_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateConversationRequest:
      type: object
      required: [term_id]
      properties:
        term_id: { type: string, description: 写入 conversations.term_id；发消息入队 ChatJobPayload 须同源读取 }
        title: { type: string }
        context_type:
          type: string
          enum: [general, topic, document]
        context_ref_id: { type: string, nullable: true }

    Message:
      type: object
      required: [id, conversation_id, role, content, created_at]
      properties:
        id: { type: string, description: message_id }
        conversation_id: { type: string }
        role:
          type: string
          description: system 消息仅服务端注入（无单独 REST 写入）；user/assistant 为对话主路径
          enum: [system, user, assistant]
        content: { type: string, description: assistant 占位允许空串 }
        status:
          allOf:
            - $ref: "#/components/schemas/AsyncTaskStatus"
          nullable: true
          description: |
            对外 JSON 字段名统一为 status（AsyncTaskStatus）。
            持久化层若使用 delivery_status 列，序列化层须与之映射，禁止再引入 msg_id 等别名。
            仅 assistant 在异步路径必填；user/system 为 null。
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PostUserMessageRequest:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1 }
        client_request_id:
          type: string
          nullable: true
          description: 客户端幂等/追踪；缺省 null；写入 ChatJobPayload
        seq:
          type: integer
          nullable: true
          description: 同会话顺序提示；缺省时由服务端生成单调 seq 写入 ChatJobPayload（与 execution_plan §14.3 一致）

    PostUserMessageResponse:
      type: object
      required: [job_id, user_message, assistant_message]
      properties:
        job_id: { type: string, description: 等同 chat_jobs 行主键或 UUID }
        user_message:
          $ref: "#/components/schemas/Message"
        assistant_message:
          $ref: "#/components/schemas/Message"

    ChatJob:
      type: object
      required:
        - job_id
        - conversation_id
        - user_message_id
        - assistant_message_id
        - status
        - retry_count
        - created_at
        - updated_at
      properties:
        job_id: { type: string, description: 与 PostUserMessageResponse.job_id、ChatJobPayload.job_id 一致 }
        conversation_id: { type: string }
        user_message_id: { type: string }
        assistant_message_id: { type: string }
        status: { $ref: "#/components/schemas/AsyncTaskStatus" }
        error_code: { type: string, nullable: true }
        error_message: { type: string, nullable: true }
        retry_count:
          type: integer
          minimum: 0
          description: Worker 侧已尝试次数（含当前轮）；0 表示首次
        max_attempts:
          type: integer
          minimum: 1
          nullable: true
          description: 策略快照；null 表示由服务端默认（与 execution_plan 有限重试一致）
        next_retry_at:
          type: string
          format: date-time
          nullable: true
          description: 计划下次重试时间；不可重试时为 null
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # --- Document ---
    DocumentTask:
      type: object
      required: [id, term_id, status, filename, task_type, language, created_at, updated_at, retry_count]
      properties:
        id: { type: string, description: 对外的 document_task_id；等同路径参数 task_id }
        term_id:
          type: string
          description: 与 POST /document-tasks multipart `term_id`、PdfJobPayload/DocumentJobPayload 同源；须落库并在 GET 单任务/列表回显
        status: { $ref: "#/components/schemas/AsyncTaskStatus" }
        filename: { type: string }
        task_type:
          type: string
          enum: [summary, conclusions, compare]
          description: POST 未传时服务端默认 summary（与 multipart 描述一致）
        language:
          type: string
          enum: [zh, en]
          description: POST 未传时服务端默认 zh
        locked_at: { type: string, format: date-time, nullable: true }
        last_completed_chunk: { type: integer, nullable: true, minimum: 0 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        result:
          type: object
          nullable: true
          properties:
            summary: { type: string }
            bullet_points:
              type: array
              items: { type: string }
            raw_model: { type: string }
        result_storage_uri: { type: string, nullable: true }
        error_code: { type: string, nullable: true }
        error_message: { type: string, nullable: true }
        retry_count:
          type: integer
          minimum: 0
          description: 任务级重试/重派累计（含 chunk 级风暴防护后的汇总语义由实现定义）
        max_attempts:
          type: integer
          minimum: 1
          nullable: true
        next_retry_at:
          type: string
          format: date-time
          nullable: true

    DocumentTaskListItem:
      type: object
      required: [id, term_id, status, filename, created_at]
      properties:
        id: { type: string }
        term_id: { type: string, description: 与 DocumentTask.term_id 一致 }
        status: { $ref: "#/components/schemas/AsyncTaskStatus" }
        filename: { type: string }
        task_type:
          type: string
          enum: [summary, conclusions, compare]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        retry_count:
          type: integer
          minimum: 0
          nullable: true
          description: 与 DocumentTask.retry_count 对齐；列表可省略（null）由实现决定
        result_preview: { type: string, nullable: true, maxLength: 512 }

    # --- Topic ---
    Topic:
      type: object
      required: [id, title, summary, requirements, status, capacity, selected_count, teacher_id, term_id, created_at]
      properties:
        id: { type: string, description: topic_id }
        title: { type: string }
        summary: { type: string }
        requirements: { type: string }
        tech_keywords:
          type: array
          items: { type: string }
        capacity: { type: integer, minimum: 1 }
        selected_count: { type: integer, minimum: 0 }
        teacher_id: { type: string }
        term_id: { type: string }
        status:
          type: string
          enum: [draft, pending_review, published, rejected, closed]
        portrait:
          type: object
          nullable: true
          properties:
            keywords:
              type: array
              items: { type: string }
            extracted_at: { type: string, format: date-time, nullable: true }
        llm_keyword_job_id:
          type: string
          nullable: true
          description: 若本次保存触发生产默认 keyword_jobs，可返回追踪 id（无则 null）
        llm_keyword_job_status:
          allOf:
            - $ref: "#/components/schemas/AsyncTaskStatus"
          nullable: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateTopicRequest:
      type: object
      required: [title, summary, requirements, capacity, term_id]
      properties:
        title: { type: string }
        summary: { type: string }
        requirements: { type: string }
        tech_keywords:
          type: array
          items: { type: string }
        capacity: { type: integer, minimum: 1 }
        term_id: { type: string }

    PatchTopicRequest:
      type: object
      description: 部分更新；仅允许草稿/被驳回等状态内字段
      properties:
        title: { type: string }
        summary: { type: string }
        requirements: { type: string }
        tech_keywords:
          type: array
          items: { type: string }
        capacity: { type: integer, minimum: 1 }

    TopicReviewRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [approve, reject]
        comment: { type: string }

    # --- Selection（业务状态枚举名与 AsyncTaskStatus 独立）---
    ApplicationFlowStatus:
      type: string
      description: 志愿填报生命周期（非 AsyncTaskStatus）
      enum: [pending, withdrawn, accepted, rejected, superseded]

    Application:
      type: object
      required: [id, topic_id, student_id, term_id, priority, status, created_at]
      properties:
        id: { type: string, description: application_id }
        topic_id: { type: string }
        topic_title: { type: string }
        student_id: { type: string }
        term_id: { type: string, description: 与 execution_plan 中 student+term+topic 唯一约束对齐 }
        priority: { type: integer, enum: [1, 2] }
        status: { $ref: "#/components/schemas/ApplicationFlowStatus" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateApplicationRequest:
      type: object
      required: [topic_id, term_id, priority]
      properties:
        topic_id: { type: string }
        term_id: { type: string }
        priority: { type: integer, enum: [1, 2] }

    PatchApplicationRequest:
      type: object
      description: 在业务规则允许时修改优先级等
      properties:
        priority: { type: integer, enum: [1, 2] }

    ApplicationDecisionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [accept, reject]
        comment: { type: string }

    Assignment:
      type: object
      required: [id, student_id, teacher_id, topic_id, term_id, status]
      properties:
        id: { type: string, description: assignment_id }
        student_id: { type: string }
        student_name: { type: string }
        teacher_id: { type: string }
        topic_id: { type: string }
        topic_title: { type: string }
        term_id: { type: string }
        application_id: { type: string, nullable: true }
        status:
          type: string
          enum: [active, cancelled]
        confirmed_at: { type: string, format: date-time, nullable: true }

    # --- 队列消息体（execution_plan 任务全集）---
    ChatJobPayload:
      type: object
      required:
        - job_id
        - conversation_id
        - user_message_id
        - assistant_message_id
        - term_id
        - user_id
      properties:
        job_id: { type: string }
        conversation_id: { type: string }
        user_message_id: { type: string, description: 用户消息 message_id }
        assistant_message_id: { type: string, description: 占位 assistant 的 message_id }
        term_id: { type: string }
        user_id: { type: string }
        client_request_id: { type: string, nullable: true }
        seq: { type: integer, nullable: true }
        request_id: { type: string, nullable: true, description: 观测用，贯穿 API→worker }
        dispatch_attempt:
          type: integer
          minimum: 0
          nullable: true
          description: 入队/重派观测；与 ChatJob.retry_count 对齐由实现定义

    PdfJobPayload:
      type: object
      description: pdf_parse 队列专用；不含 chunk_index
      required:
        - document_task_id
        - user_id
        - storage_path
        - term_id
      properties:
        document_task_id: { type: string }
        user_id: { type: string }
        storage_path: { type: string }
        term_id: { type: string }
        stage:
          type: string
          enum: [pdf_extract]
          default: pdf_extract
        request_id: { type: string, nullable: true }

    DocumentJobPayload:
      type: object
      description: document_jobs 队列；分块/阶段幂等键与 execution_plan 一致
      required:
        - document_task_id
        - user_id
        - storage_path
        - term_id
      properties:
        document_task_id: { type: string }
        user_id: { type: string }
        storage_path: { type: string }
        term_id: { type: string }
        schema_version:
          type: string
          description: 载荷 schema 版本；worker 多版本/重放时由实现写死；缺省语义由实现定义
          nullable: true
        task_type:
          type: string
          enum: [summary, conclusions, compare]
        language:
          type: string
          enum: [zh, en]
        chunk_index:
          type: integer
          minimum: 0
          nullable: true
          description: 控制面/汇总任务可为 null；分块 LLM 子任务必填
        stage:
          type: string
          description: 幂等键一部分；**pdf_parse 队列** 使用 PdfJobPayload.stage=`pdf_extract`；**document_jobs** 仅使用下列阶段
          enum:
            - extract
            - summarize_chunk
            - aggregate
            - finalize
        max_chunks: { type: integer, nullable: true }
        request_id: { type: string, nullable: true }
        dispatch_attempt:
          type: integer
          minimum: 0
          nullable: true
          description: 入队/重派次数观测；与 DocumentTask.retry_count 对齐语义由实现定义

    KeywordJobPayload:
      type: object
      required:
        - keyword_job_id
        - topic_id
        - term_id
        - text_snapshot
        - requested_by_user_id
      properties:
        keyword_job_id: { type: string, description: 与 DB/日志对齐的 job 主键 }
        topic_id: { type: string }
        term_id: { type: string }
        text_snapshot: { type: string }
        requested_by_user_id: { type: string, description: 触发保存的教师或系统用户 user_id }
        request_id: { type: string, nullable: true }
        retry_count:
          type: integer
          minimum: 0
          nullable: true
        max_attempts:
          type: integer
          minimum: 1
          nullable: true

    ReconcileJobPayload:
      type: object
      description: |
        execution_plan 可选 reconcile_jobs：仅 Worker/调度内部入队消费，无公开 HTTP。
        是否落库 AsyncTaskStatus 由实现择一写死；本 payload 不携带 status 字段以免与业务枚举混淆。
      required: [reconcile_job_id, scope]
      properties:
        reconcile_job_id: { type: string }
        scope:
          type: string
          enum: [by_term, full_table]
        term_id: { type: string, nullable: true, description: scope=by_term 时必填 }
        request_id: { type: string, nullable: true }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    UserSummary:
      type: object
      required: [id, username, role, display_name]
      properties:
        id: { type: string }
        username: { type: string }
        role:
          type: string
          enum: [student, teacher, admin]
        display_name: { type: string }

    LoginResponse:
      type: object
      required: [access_token, token_type, expires_in, user]
      properties:
        access_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer }
        user: { $ref: "#/components/schemas/UserSummary" }

    RefreshResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer }

    UserMe:
      type: object
      required: [id, username, role, display_name]
      properties:
        id: { type: string }
        username: { type: string }
        role: { type: string }
        display_name: { type: string }
        email: { type: string, nullable: true }
        student_profile: { type: object, nullable: true, additionalProperties: true }
        teacher_profile: { type: object, nullable: true, additionalProperties: true }

    PatchUserMeRequest:
      type: object
      properties:
        display_name: { type: string }
        email: { type: string }
        student_profile: { type: object, nullable: true }
        teacher_profile: { type: object, nullable: true }

    Term:
      type: object
      required: [id, name, created_at]
      properties:
        id: { type: string, description: term_id }
        name: { type: string }
        selection_start_at: { type: string, format: date-time, nullable: true }
        selection_end_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    CreateTermRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        selection_start_at: { type: string, format: date-time, nullable: true }
        selection_end_at: { type: string, format: date-time, nullable: true }

    PatchTermRequest:
      type: object
      properties:
        name: { type: string }
        selection_start_at: { type: string, format: date-time, nullable: true }
        selection_end_at: { type: string, format: date-time, nullable: true }

    LlmConfig:
      type: object
      description: 与 term_id 绑定单一真源（§10.1.1）；字段可按实现扩展
      properties:
        provider: { type: string, nullable: true }
        daily_budget_tokens: { type: integer, nullable: true }
        per_user_daily_tokens: { type: integer, nullable: true }

    Milestone:
      type: object
      required: [id, student_id, title, status, created_at]
      properties:
        id: { type: string }
        student_id: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
        status: { type: string, enum: [todo, doing, done] }
        sort_order: { type: integer }
        is_overdue: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateMilestoneRequest:
      type: object
      required: [title, start_date, end_date, status]
      properties:
        title: { type: string }
        description: { type: string }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
        status: { type: string, enum: [todo, doing, done] }
        sort_order: { type: integer, default: 0 }

    PatchMilestoneRequest:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
        status: { type: string, enum: [todo, doing, done] }
        sort_order: { type: integer }

    RecommendationTopicItem:
      type: object
      required: [topic_id, title, score]
      properties:
        topic_id: { type: string }
        title: { type: string }
        score: { type: number }
        explain:
          type: object
          nullable: true
          properties:
            matched_skills:
              type: array
              items: { type: string }
            matched_keywords:
              type: array
              items: { type: string }
            reasons:
              type: array
              items: { type: string }

    RecommendationTopicList:
      type: object
      required: [items, top_n]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/RecommendationTopicItem" }
        top_n: { type: integer, minimum: 1 }

    PaginatedList:
      type: object
      properties:
        items:
          type: array
          items: {}
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }
        total: { type: integer, minimum: 0 }

paths:
  /auth/login:
    post:
      tags: [identity]
      summary: 登录（Access JSON + Refresh HttpOnly Cookie 由实现与 architecture.spec 一致）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /auth/refresh:
    post:
      tags: [identity]
      summary: 刷新访问令牌（默认使用 HttpOnly Refresh Cookie）
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefreshResponse" }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /auth/logout:
    post:
      tags: [identity]
      summary: 登出（作废 Refresh；清除 HttpOnly Cookie 行为与 architecture.spec 一致）
      responses:
        "204":
          description: No Content
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /users/me:
    get:
      tags: [identity]
      summary: 当前用户资料
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserMe" }
    patch:
      tags: [identity]
      summary: 更新当前用户资料（含学生画像等）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchUserMeRequest" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserMe" }

  /terms:
    get:
      tags: [terms]
      summary: 学期列表（角色可见范围由实现裁剪）
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Term" }
    post:
      tags: [terms]
      summary: 管理员新建学期
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTermRequest" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Term" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /terms/{term_id}:
    parameters:
      - name: term_id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [terms]
      summary: 单学期详情
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Term" }

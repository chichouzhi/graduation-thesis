          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentTask" }
        "429":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    get:

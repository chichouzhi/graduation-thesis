x-task-contracts:
  description: |
    非 HTTP；与 architecture.spec（queue+worker）及 execution_plan 阶段 4 一致。
    reconcile_jobs 无 REST 暴露；**P0 触发**：见 execution_plan 阶段 3 `SelectionService`（教师 accept 事务提交成功后须 enqueue）。
    payload 不含 AsyncTaskStatus；若落库对账任务状态由实现自定枚举。
  x-watchdog-on-timeout:
    strategy: fail
    description: |
      与 execution_plan 阶段 4 写死一致：`running` 超时 **仅** 转 `failed`，**禁止** `running→pending` 重入队（避免契约与实现双语义）。
  queues:
    chat_jobs:
      payload_schema: "#/components/schemas/ChatJobPayload"
    pdf_parse:
      payload_schema: "#/components/schemas/PdfJobPayload"
    document_jobs:
      payload_schema: "#/components/schemas/DocumentJobPayload"
    keyword_jobs:
      payload_schema: "#/components/schemas/KeywordJobPayload"
    reconcile_jobs:
      payload_schema: "#/components/schemas/ReconcileJobPayload"

  async_task_status:
    $ref: "#/components/schemas/AsyncTaskStatus"

  state_machines:
    llm_and_document_worker_tasks:
      description: chat_jobs、document_tasks、assistant 占位、Topic 侧 llm_keyword_job_status 等采用 AsyncTaskStatus；reconcile_jobs 不在此强约束
      states: [pending, running, done, failed]
      transitions:
        - { from: pending, to: running, trigger: worker_claim }
        - { from: running, to: done, trigger: success_commit }
        - { from: running, to: failed, trigger: error_or_watchdog }
        - { from: pending, to: failed, trigger: enqueue_failed_compensation }

  naming:
    id_fields:
      - conversation_id
      - message_id
      - user_message_id
      - assistant_message_id
      - document_task_id
      - topic_id
      - term_id
      - user_id
      - job_id
      - application_id
      - assignment_id
      - keyword_job_id
      - reconcile_job_id
    forbidden_aliases:
      - msg_id
      - conv_id
      - tid
      - uid
